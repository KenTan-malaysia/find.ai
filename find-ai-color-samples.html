<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find.ai — Landing Page Color Themes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; }

  .picker {
    position: sticky; top: 0; z-index: 100;
    background: white; border-bottom: 1px solid #e2e8f0;
    padding: 16px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .picker h2 { font-size: 14px; color: #334155; margin-right: 8px; white-space: nowrap; }
  .picker button {
    padding: 8px 18px; border-radius: 100px; font-size: 13px; font-weight: 600;
    border: 2px solid #e2e8f0; background: white; color: #475569; cursor: pointer;
    transition: all 0.2s;
  }
  .picker button:hover { border-color: #94a3b8; }
  .picker button.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }

  .phone-frame {
    width: 390px; margin: 40px auto; border-radius: 40px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
    background: #000;
  }
  .phone-notch {
    height: 34px; background: #000; display: flex; align-items: center; justify-content: center;
  }
  .phone-notch div { width: 120px; height: 6px; background: #1a1a1a; border-radius: 3px; margin-top: 8px; }

  .landing { min-height: 800px; overflow: hidden; }

  /* Header */
  .l-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
  .l-logo { display: flex; align-items: center; gap: 10px; }
  .l-logo-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; }
  .l-logo-text { font-size: 15px; font-weight: 600; }
  .l-lang { font-size: 11px; padding: 6px 14px; border-radius: 100px; font-weight: 600; border: 1px solid; }

  /* Hero */
  .l-hero { text-align: center; padding: 36px 24px 24px; }
  .l-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 600; margin-bottom: 20px; border: 1px solid; }
  .l-badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .l-title { font-size: 24px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
  .l-sub { font-size: 13px; line-height: 1.6; max-width: 300px; margin: 0 auto 24px; }
  .l-cta { display: inline-block; padding: 14px 32px; border-radius: 14px; font-size: 14px; font-weight: 600; color: white; border: none; }
  .l-free { font-size: 11px; margin-top: 10px; }

  /* Stats */
  .l-stats { display: flex; justify-content: center; gap: 40px; padding: 20px 24px; margin: 0 24px; border-radius: 16px; }
  .l-stat-num { font-size: 20px; font-weight: 700; }
  .l-stat-label { font-size: 11px; margin-top: 4px; }

  /* Features */
  .l-features { padding: 32px 24px; }
  .l-features-title { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 16px; }
  .l-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .l-card { padding: 16px; border-radius: 14px; border: 1px solid; }
  .l-card-icon { font-size: 18px; margin-bottom: 8px; }
  .l-card-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .l-card-desc { font-size: 11px; line-height: 1.5; }

  /* Problems */
  .l-problems { padding: 24px; text-align: center; }
  .l-problems-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .l-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
  .l-chip { font-size: 11px; padding: 8px 14px; border-radius: 100px; border: 1px solid; }

  /* Bottom CTA */
  .l-bottom { padding: 40px 24px; text-align: center; border-top: 1px solid; border-radius: 20px 20px 0 0; margin-top: 16px; }
  .l-bottom-text { font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  .l-bottom-cta { display: inline-block; padding: 14px 32px; border-radius: 14px; font-size: 14px; font-weight: 600; color: white; }
  .l-disclaimer { font-size: 9px; margin-top: 12px; }

  /* Theme label */
  .theme-label {
    text-align: center; margin-top: 12px; margin-bottom: 40px;
    font-size: 13px; color: #64748b; font-weight: 500;
  }
</style>
</head>

function show(id) {

  const t = themes[id];

    <div class="phone-frame">
      <div class="phone-notch"><div></div></div>
      ${render(t)}
    </div>
    <div class="theme-label">${t.name} — ${t.desc}</div>
  `;
}
